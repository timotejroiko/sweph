name: Prebuild

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'swisseph/**'
      - 'binding.gyp'

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  test:
    name: test (${{ matrix.name }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install --build-from-source

  build:
    name: ${{ matrix.artifact }}
    needs: test
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            container: ghcr.io/prebuild/almalinux-devtoolset11
            artifact: linux-x64
          - os: ubuntu-latest
            container: ghcr.io/prebuild/linux-arm64
            artifact: linux-arm64
          - os: macos-latest
            artifact: darwin-arm64
          - os: windows-latest
            artifact: win32-x64
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install --ignore-scripts
      - run: npm run preinstall
      - run: npm run prebuild
      - uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.artifact }}
          path: prebuilds/
          compression-level: 0

  commit:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/download-artifact@v8
        with:
          path: prebuilds/
          merge-multiple: true
          pattern: prebuild-*
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prebuilds/
          git diff --staged --quiet || git commit -m "chore: update prebuilds"
          git push
